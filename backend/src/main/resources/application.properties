spring.datasource.url=jdbc:postgresql://localhost:5432/realestate
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

server.port=8080
# Allow larger file uploads (10MB)
server.tomcat.max-http-post-size=10485760
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ────────────────────────────────────────────────────────
# LIVE MAIL CONFIGURATION (Templates)
# ────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ────────────────────────────────────────────────────────
# JWT CONFIGURATION
# ────────────────────────────────────────────────────────
# In deployment, set the JWT_SECRET environment variable.
jwt.secret=${JWT_SECRET:7p9r2w5z8x-A_v3ry_L0ng_And_S3cur3_R4nd0m_K3y_F0r_Pr0pM4n4g3_2024_!}
# Token expires in 24 hours (milliseconds)
jwt.expiration-ms=86400000

# CORS CONFIGURATION
# Set ALLOWED_ORIGINS env var to your production frontend URL (e.g., https://your-app.vercel.app)
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}